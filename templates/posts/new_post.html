{% extends "base.html" %} {% block title %}Create New Post - SnapGram{% endblock title %} {% block content %}
<div class="min-h-screen bg-base-100">
  <div
    class="flex items-center justify-between px-6 py-4 border-b border-base-300"
  >
    <a href="{% url 'feed' %}" class="btn btn-ghost btn-sm gap-1">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
    </a>
    <h1 class="font-bold text-base">Create new post</h1>
    <button
      form="create-post-form"
      type="submit"
      class="btn btn-ghost btn-sm text-primary font-semibold"
    >
      Share
    </button>
  </div>

  <form id="create-post-form" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="flex h-[calc(100vh-65px)]">
      <div class="w-1/2 bg-black flex items-center justify-center">
        <div
          id="image-preview"
          class="w-full h-full flex items-center justify-center"
        >
          <label
            for="id_image"
            class="cursor-pointer flex flex-col items-center gap-3 text-white/60 hover:text-white/90 transition"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-16 w-16"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
              />
            </svg>
            <span class="text-sm">Click to select photo</span>
          </label>
          <img
            id="preview-img"
            src=""
            alt=""
            class="hidden object-contain max-h-full max-w-full"
          />
        </div>
        {{ form.image }}
      </div>

      <div class="w-1/2 flex flex-col border-l border-base-300">
        <div class="flex items-center gap-3 p-4 border-b border-base-300">
          <div class="avatar">
            <div class="w-8 rounded-full">
              {% if request.user.profile.avatar %}
              <img
                src="{{ request.user.profile.avatar.url }}"
                alt="{{ request.user.username }}"
                class="object-cover"
              />
              {% endif %}
            </div>
          </div>
          <span class="font-semibold text-sm">{{ request.user.username }}</span>
        </div>

        <div class="flex-1 p-4">
          <textarea
            name="caption"
            maxlength="200"
            placeholder="Write a caption..."
            class="textarea w-full h-40 resize-none border-none focus:outline-none bg-transparent text-sm"
            id="id_caption"
            oninput="updateCount(this)"
          ></textarea>
        </div>

        <div class="px-4 pb-4 text-right">
          <span id="caption-count" class="text-xs text-base-content/50"
            >0/200</span
          >
        </div>
      </div>
    </div>
  </form>
</div>

<script>
  document.getElementById("id_image").addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
      const preview = document.getElementById("preview-img");
      const label = document.querySelector("#image-preview label");
      preview.src = URL.createObjectURL(file);
      preview.classList.remove("hidden");
      if (label) label.classList.add("hidden");
    }
  });

  function updateCount(el) {
    document.getElementById("caption-count").textContent =
      el.value.length + "/200";
  }
</script>
{% endblock content %}
