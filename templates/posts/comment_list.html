{% for comment in comments %}
<div class="flex gap-2 items-start" id="comment-{{ comment.id }}">
    <div class="avatar">
        <div class="w-7 rounded-full">
            {% if comment.author.profile.avatar %}
                <img src="{{ comment.author.profile.avatar.url }}" alt="{{ comment.author.username }}" class="object-cover"/>
            {% endif %}
        </div>
    </div>
    <div class="flex-1">
        <span class="font-semibold text-sm mr-1">{{ comment.author.username }}</span>
        <span class="text-sm">{{ comment.content }}</span>
        <p class="text-xs text-base-content/50 mt-1">{{ comment.created_at|timesince }} ago</p>
    </div>
    {% if request.user == comment.author %}
    <div class="dropdown dropdown-end">
        <button tabindex="0" class="btn btn-ghost btn-xs">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
                <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            </svg>
        </button>
        <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box shadow w-32 p-1 z-10">
            <li>
                <button class="text-error text-sm flex items-center gap-1"
                    hx-post="{% url 'delete_comment' comment.id %}"
                    hx-target="#comment-{{ comment.id }}"
                    hx-swap="outerHTML">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Delete
                </button>
            </li>
        </ul>
    </div>
    {% endif %}
</div>
{% empty %}
    <p class="text-sm text-base-content/50 text-center">No comments yet.</p>
{% endfor %}
