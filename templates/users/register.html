{% extends "base.html" %}
{% block title %}SnapGram - Register{% endblock title %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-base-100">
    <div class="w-96">
        <h1 class="text-3xl font-bold text-center mb-6">SnapGram</h1>
        <form action="{% url 'register' %}" method="POST">
            {% csrf_token %}
            {% for message in messages %}
                <p class="text-error text-sm mb-2">{{ message }}</p>
            {% endfor %}
            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full border p-4">
                <legend class="fieldset-legend font-bold">Register</legend>
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="label">First Name</label>
                        <input type="text" class="input w-full" name="first_name" placeholder="First Name"/>
                    </div>
                    <div class="flex-1">
                        <label class="label">Last Name</label>
                        <input type="text" class="input w-full" name="last_name" placeholder="Last Name"/>
                    </div>
                </div>
                <label class="label mt-2">Username</label>
                <input type="text" class="input w-full" name="username" placeholder="Username"/>
                <label class="label mt-2">Email</label>
                <input type="email" class="input w-full" name="email" placeholder="Email"/>
                <label class="label mt-2">Password</label>
                <input type="password" class="input w-full" name="password" placeholder="Password"/>
                <label class="label mt-2">Confirm Password</label>
                <input type="password" class="input w-full" name="confirm_password" placeholder="Confirm Password"/>
                <button class="btn btn-neutral w-full mt-4">Register</button>
            </fieldset>
            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="link link-hover text-sm">Already have an account? Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
