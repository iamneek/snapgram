{% for user in user_list %}
<a href="{% url 'profile' username=user.username %}" 
   class="flex items-center gap-3 p-3 hover:bg-base-200 transition">
    <div class="avatar">
        <div class="w-8 rounded-full">
            {% if user.profile.avatar %}
                <img src="{{ user.profile.avatar.url }}" alt="{{ user.username }}" class="object-cover"/>
            {% endif %}
        </div>
    </div>
    <div>
        <p class="font-semibold text-sm">{{ user.username }}</p>
        <p class="text-xs text-base-content/50">{{ user.first_name }} {{ user.last_name }}</p>
    </div>
</a>
{% endfor %}
