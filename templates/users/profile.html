{% extends "base.html" %}
{% block title %}SnapGram - {{ user.username }}'s Profile{% endblock title %}

{% block content %}
<div class="min-h-screen bg-base-100">

    <div class="max-w-2xl mx-auto px-4 py-8">
        
        <div class="flex items-center gap-8 mb-8">
            <div class="avatar">
                <div class="w-24 rounded-full">
                    <img src="{{ user.profile.avatar.url }}" alt="{{ user.username }}" />
                </div>
            </div>
            <div class="flex-1">
                <div class="flex items-center gap-4 mb-2">
                    <h1 class="text-xl font-semibold">{{ user.username }}</h1>
                    {% if request.user == user %}
                        <a href="{% url 'edit_profile' username=user.username %}" class="btn btn-sm btn-outline">Edit Profile</a>
                    {% endif %}
                </div>
                <p class="text-base-content/70 text-sm">{{ user.first_name }} {{ user.last_name }}</p>
                <p class="mt-2 text-sm">{{ user.profile.bio }}</p>
            </div>
        </div>

        <!-- TODO: posts grid -->
    </div>
</div>
{% endblock content %}
